name: stemxploref2
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.3
  shared_preferences: ^2.2.2
  flutter_slidable: ^3.1.0
  provider: ^6.1.1
  curved_navigation_bar: ^1.0.6
  flutter_localization: ^0.3.3
  video_player: ^2.8.1
  chewie: ^1.8.1
  http: ^1.2.0
  confetti: ^0.7.0
  audioplayers: ^5.2.1
  sqflite: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.0
  visibility_detector: ^0.4.0+2
  photo_view: ^0.14.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/Screen_Logo.png" # Legacy/iOS icon (the one with background)
  min_sdk_android: 21
  # The fix for modern Android:
  adaptive_icon_background: "#FFD38F" 
  adaptive_icon_foreground: "assets/images/test.png" # Your transparent logo

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: false
  uses-material-design: true

  assets:
    - assets/fonts/Alice-Regular.ttf
    - assets/database/stemxploref2.db
    - assets/images/Logo_F2_2.png
    - assets/icons/
    - assets/flag/
    - assets/textbook/
    - assets/images/
    - assets/audio/quiz_bm.music.mp3
    - assets/stem_info/images/
    - assets/stem_info/videos/
    - assets/daily_info/
    - assets/highlights/images/
    - assets/highlights/videos/
    - assets/FAQ/
    - assets/Quiz/
    - assets/ASK/Book_cover/
    - assets/ASK/Infographics/
    - assets/Math/Book_cover/
    - assets/Math/Infographics/
    - assets/RBT/Book_cover/
    - assets/RBT/Infographics/
    - assets/Science/Book_cover/
    - assets/Science/Infographics/
    - assets/STEM_Careers/